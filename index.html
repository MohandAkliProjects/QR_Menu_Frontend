<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>QResto — Menu digital QR code pour restaurants et cafés</title>

    <meta
      name="description"
      content="QResto vous permet de créer un menu digital accessible par QR code : mise à jour en temps réel, sans réimpression, multilingue. Idéal pour restaurants, cafés et fast-foods."
    />

    <meta
      name="keywords"
      content="menu QR code, menu digital, menu restaurant, QR menu, carte digitale restaurant, QResto"
    />

    <meta name="robots" content="index, follow" />

    <link
      rel="canonical"
      href="https://qrestodz.app/"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="QResto" />

    <meta
      property="og:title"
      content="QResto — Menu digital QR code pour restaurants et cafés"
    />

    <meta
      property="og:description"
      content="Créez un menu digital pour votre restaurant, accessible instantanément par QR code. Mise à jour en temps réel, sans frais de réimpression."
    />

    <meta
      property="og:image"
      content="https://qrestodz.app/og-image.png"
    />

    <meta
      property="og:image:alt"
      content="QResto — Menu digital QR code pour restaurants et cafés"
    />

    <meta
      property="og:url"
      content="https://qrestodz.app/"
    />

    <meta
      property="og:locale"
      content="fr_DZ"
    />

    <!-- Twitter / X Card -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="QResto — Menu digital QR code pour restaurants"
    />

    <meta
      name="twitter:description"
      content="Créez un menu digital pour votre restaurant, accessible instantanément par QR code."
    />

    <meta
      name="twitter:image"
      content="https://qrestodz.app/og-image.png"
    />

    <meta
      name="twitter:image:alt"
      content="QResto — Menu digital QR code"
    />

    <!-- Performance: Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Nunito:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="/favicon.png"
    />

    <link
      rel="apple-touch-icon"
      href="/favicon.png"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "QResto",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "url": "https://qrestodz.app/",
      "description": "Plateforme de menu digital QR code pour restaurants, cafés et fast-foods en Algérie."
    }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script
      type="module"
      src="/src/main.tsx"
    ></script>
  </body>
</html>
